<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JT SWPPP — Feature Priority Survey</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #013040;
    --mid: #016080;
    --light: #02BFFF;
    --lighter: #e6f7ff;
    --text: #1a1a1a;
    --text-muted: #6b7280;
    --border: #e2e8f0;
    --bg: #f8fafc;
    --white: #ffffff;
    --danger: #dc2626;
    --success: #059669;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .page-header {
    background: var(--dark);
    padding: 28px 24px 24px;
    text-align: center;
  }

  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 12px;
  }

  .page-header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .page-header p {
    font-size: 14px;
    color: rgba(255,255,255,0.65);
    line-height: 1.5;
    max-width: 420px;
    margin: 0 auto;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  .budget-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 20px;
    position: sticky;
    top: 12px;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .budget-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .budget-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .budget-remaining {
    font-size: 22px;
    font-weight: 700;
    color: var(--dark);
    transition: color 0.2s;
  }

  .budget-remaining.over { color: var(--danger); }
  .budget-remaining.done { color: var(--success); }

  .budget-track {
    height: 6px;
    background: #e2e8f0;
    border-radius: 999px;
    overflow: hidden;
  }

  .budget-fill {
    height: 100%;
    border-radius: 999px;
    background: var(--mid);
    transition: width 0.2s, background 0.2s;
  }

  .budget-hint {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 7px;
  }

  .budget-hint.warning { color: var(--danger); }
  .budget-hint.complete { color: var(--success); }

  .features { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

  .feature-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .feature-card.active {
    border-color: var(--mid);
    box-shadow: 0 0 0 3px rgba(1,96,128,0.08);
  }

  .feat-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--lighter);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .feat-icon svg {
    width: 20px;
    height: 20px;
    stroke: var(--mid);
    fill: none;
    stroke-width: 1.75;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .feat-body { flex: 1; }

  .feat-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 2px;
  }

  .feat-sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  .input-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .dollar { font-size: 15px; font-weight: 500; color: var(--text-muted); }

  .feat-input {
    width: 62px;
    text-align: right;
    font-size: 17px;
    font-weight: 600;
    color: var(--dark);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 8px;
    background: var(--bg);
    appearance: textfield;
    -moz-appearance: textfield;
    outline: none;
    transition: border-color 0.15s;
  }

  .feat-input::-webkit-outer-spin-button,
  .feat-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .feat-input:focus { border-color: var(--mid); background: #fff; }

  .actions { display: flex; gap: 10px; }

  .btn-reset {
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--white);
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-reset:hover { background: var(--bg); }

  .btn-submit {
    flex: 1;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: var(--dark);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.3; cursor: default; }

  .results-page { display: none; }

  .results-header {
    background: var(--dark);
    padding: 28px 24px 24px;
    text-align: center;
  }

  .results-header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
  }

  .results-header p { font-size: 14px; color: rgba(255,255,255,0.6); }

  .result-row {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
  }

  .result-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .result-name { font-size: 13.5px; font-weight: 500; color: var(--text); flex: 1; padding-right: 12px; line-height: 1.4; }

  .result-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

  .result-pct {
    font-size: 16px;
    font-weight: 700;
    color: var(--dark);
    min-width: 40px;
    text-align: right;
  }

  .result-amt {
    font-size: 12px;
    color: var(--text-muted);
    min-width: 30px;
    text-align: right;
  }

  .result-track { height: 5px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
  .result-fill { height: 100%; border-radius: 999px; background: var(--mid); }

  .result-rank {
    display: inline-block;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--lighter);
    color: var(--mid);
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    line-height: 22px;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .result-rank.top { background: var(--dark); color: #fff; }

  .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--white);
    padding: 7px 14px;
    cursor: pointer;
    margin-bottom: 20px;
  }

  .btn-back:hover { background: var(--bg); }

  .total-allocated {
    background: var(--dark);
    color: #fff;
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .total-allocated span:first-child { font-size: 13px; opacity: 0.7; }
  .total-allocated span:last-child { font-size: 18px; font-weight: 700; }
</style>
</head>
<body>

<!-- Survey Page -->
<div id="surveyPage">
  <div class="page-header">
    <div class="logo">JT SWPPP</div>
    <h1>Help us build the right product</h1>
    <p>You have $100 to spend. Assign dollars to the features most valuable to you. Spend it all however you'd like.</p>
  </div>

  <div class="container">
    <div class="budget-card">
      <div class="budget-top">
        <span class="budget-label">Remaining budget</span>
        <span class="budget-remaining" id="budgetNum">$100</span>
      </div>
      <div class="budget-track">
        <div class="budget-fill" id="budgetFill" style="width:0%"></div>
      </div>
      <p class="budget-hint" id="budgetHint">Assign dollars to features below</p>
    </div>

    <div class="features" id="featureList"></div>

    <div class="actions">
      <button class="btn-reset" onclick="resetAll()">Reset</button>
      <button class="btn-submit" id="submitBtn" onclick="showResults()" disabled>Submit</button>
    </div>
  </div>
</div>

<!-- Results Page -->
<div id="resultsPage" class="results-page">
  <div class="results-header">
    <h1>Your results</h1>
    <p>Features ranked by the dollars you assigned</p>
  </div>
  <div class="container">
    <button class="btn-back" onclick="goBack()">← Go back</button>
    <div class="total-allocated">
      <span>Total allocated</span>
      <span id="totalAllocated">$0 / $100</span>
    </div>
    <div id="resultsList"></div>
  </div>
</div>

<script>
const BUDGET = 100;

const FEATURES = [
  {
    name: "Live camera dashboard",
    sub: "View all jobsites with pan, tilt, and zoom controls",
    icon: `<svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M8 6V4M16 6V4M12 6V4"/><circle cx="12" cy="13" r="3"/></svg>`
  },
  {
    name: "Homeowner portal",
    sub: "Live camera access and build progress updates for the homeowner",
    icon: `<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`
  },
  {
    name: "Compliance documents",
    sub: "Inspection reports, SWPPP, NOI, and compliance docs in one place",
    icon: `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`
  },
  {
    name: "Hourly photo log",
    sub: "Browse photos taken every hour to see exactly what happened on site",
    icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`
  },
  {
    name: "Build time-lapse",
    sub: "Full time-lapse video of the entire build from start to finish",
    icon: `<svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`
  },
  {
    name: "Motion-activated security",
    sub: "Recordings triggered by movement on site with instant alerts",
    icon: `<svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`
  },
  {
    name: "View and pay invoices",
    sub: "See outstanding invoices and make payments directly in the app",
    icon: `<svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>`
  }
];

let vals = new Array(FEATURES.length).fill(0);

function buildList() {
  const list = document.getElementById('featureList');
  list.innerHTML = '';
  FEATURES.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'feature-card' + (vals[i] > 0 ? ' active' : '');
    card.id = 'card-' + i;
    card.innerHTML = `
      <div class="feat-icon">${f.icon}</div>
      <div class="feat-body">
        <div class="feat-name">${f.name}</div>
        <div class="feat-sub">${f.sub}</div>
      </div>
      <div class="input-wrap">
        <span class="dollar">$</span>
        <input class="feat-input" type="number" min="0" max="${BUDGET}" step="1"
          value="${vals[i] > 0 ? vals[i] : ''}" placeholder="0" data-i="${i}" />
      </div>
    `;
    list.appendChild(card);
  });
  list.querySelectorAll('.feat-input').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = +e.target.dataset.i;
      vals[i] = Math.max(0, Math.floor(+e.target.value || 0));
      updateBudget();
      document.getElementById('card-' + i).className = 'feature-card' + (vals[i] > 0 ? ' active' : '');
    });
  });
}

function updateBudget() {
  const spent = vals.reduce((a, b) => a + b, 0);
  const rem = BUDGET - spent;
  const pct = Math.min(100, (spent / BUDGET) * 100);
  const fill = document.getElementById('budgetFill');
  const num = document.getElementById('budgetNum');
  const hint = document.getElementById('budgetHint');
  const btn = document.getElementById('submitBtn');

  fill.style.width = pct + '%';
  fill.style.background = rem < 0 ? '#dc2626' : rem === 0 ? '#059669' : '#016080';

  num.textContent = (rem >= 0 ? '$' : '-$') + Math.abs(rem);
  num.className = 'budget-remaining' + (rem < 0 ? ' over' : rem === 0 ? ' done' : '');

  if (rem < 0) {
    hint.textContent = "You're $" + Math.abs(rem) + " over budget — reduce some values to continue.";
    hint.className = 'budget-hint warning';
    btn.disabled = true;
  } else if (rem === 0) {
    hint.textContent = "Budget fully allocated. Ready to submit!";
    hint.className = 'budget-hint complete';
    btn.disabled = false;
  } else if (spent > 0) {
    hint.textContent = "$" + rem + " left to assign";
    hint.className = 'budget-hint';
    btn.disabled = false;
  } else {
    hint.textContent = "Assign dollars to features below";
    hint.className = 'budget-hint';
    btn.disabled = true;
  }
}

function resetAll() {
  vals = new Array(FEATURES.length).fill(0);
  buildList();
  updateBudget();
}

function showResults() {
  const spent = vals.reduce((a, b) => a + b, 0);
  document.getElementById('surveyPage').style.display = 'none';
  document.getElementById('resultsPage').style.display = 'block';
  document.getElementById('totalAllocated').textContent = '$' + spent + ' / $' + BUDGET;

  const sorted = FEATURES.map((f, i) => ({ name: f.name, sub: f.sub, val: vals[i] }))
    .sort((a, b) => b.val - a.val);
  const max = sorted[0].val || 1;

  const rlist = document.getElementById('resultsList');
  rlist.innerHTML = '';
  sorted.forEach((r, rank) => {
    const pct = spent > 0 ? Math.round((r.val / spent) * 100) : 0;
    const row = document.createElement('div');
    row.className = 'result-row';
    row.innerHTML = `
      <div class="result-top">
        <span class="result-rank ${rank === 0 ? 'top' : ''}">${rank + 1}</span>
        <span class="result-name">${r.name}</span>
        <div class="result-right">
          <span class="result-pct">${pct}%</span>
          <span class="result-amt">$${r.val}</span>
        </div>
      </div>
      <div class="result-track">
        <div class="result-fill" style="width:${(r.val / max) * 100}%"></div>
      </div>
    `;
    rlist.appendChild(row);
  });

  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('resultsPage').style.display = 'none';
  document.getElementById('surveyPage').style.display = 'block';
  window.scrollTo(0, 0);
}

buildList();
updateBudget();
</script>
</body>
</html>
